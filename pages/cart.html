<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1b1b20">
    <title>سلة التسوق - BODA</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        /* Specific styles for cart that extend the main theme */
        
        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            margin: 2rem 0 4rem;
        }

        .page-title {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .cart-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* Cart Items */
        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .cart-item:last-child { border-bottom: none; }
        
        .cart-item:hover {
            background: rgba(255, 255, 255, 0.02);
            padding-right: 1rem;
            padding-left: 1rem;
            border-radius: 10px;
        }

        .item-img {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .item-details h3 {
            font-size: 1.1rem;
            margin: 0 0 0.5rem;
            color: #fff;
        }

        .item-price {
            color: #00d4ff;
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Quantity Controls */
        .quantity-ctrl {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.3rem;
            border-radius: 20px;
            width: fit-content;
            margin-top: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            color: #e0e0e0;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .qty-btn:hover { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }

        .qty-val {
            width: 30px;
            text-align: center;
            font-weight: 700;
            color: #fff;
        }

        .item-actions {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
        }

        .remove-btn {
            color: #ff4757;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            padding: 0.5rem;
            opacity: 0.8;
        }

        .remove-btn:hover { 
            transform: scale(1.1); 
            color: #ff6b81; 
            opacity: 1;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }

        /* Sidebar Summary */
        .summary-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 100px;
            height: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .summary-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            color: #00d4ff;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: 500;
            color: #e0e0e0;
        }
        
        .summary-row span.text-muted {
            color: #aaa;
        }

        .summary-total {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px dashed rgba(255, 255, 255, 0.2);
            font-size: 1.4rem;
            font-weight: 800;
        }

        .checkout-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(45deg, #00d4ff, #090979);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .checkout-btn:hover {
            background: linear-gradient(45deg, #090979, #00d4ff);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.5);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #e0e0e0;
        }

        .empty-state i {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.1);
            margin-bottom: 1.5rem;
        }
        
        .empty-state h2 {
            font-family: 'Orbitron', monospace;
            color: #00d4ff;
            margin-bottom: 1rem;
        }

        .browse-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.8rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .browse-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        @media (max-width: 992px) {
            .cart-layout { grid-template-columns: 1fr; }
            .summary-card { position: static; }
        }

        @media (max-width: 576px) {
            .cart-item { grid-template-columns: 80px 1fr; gap: 1rem; }
            .item-actions { grid-column: 1 / -1; flex-direction: row; align-items: center; margin-top: 1rem; background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 10px; }
            .item-img { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container" onclick="window.location.href='../index.html'" style="cursor: pointer;">
            <div class="logo">🛍️ BODA</div>
        </div>
        <div class="header-search">
            <form action="products.html" method="GET" class="search-form">
                <input type="text" name="search" placeholder="ابحث عن المنتجات..." aria-label="Search">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>
        <nav class="nav-menu">
            <a href="../index.html">🏠 الرئيسية</a>
            <a href="products.html">📦 المنتجات</a>
            <a href="login.html" id="login-link">🔐 تسجيل الدخول </a>
            <a href="orders.html">📋 الطلبات</a>
            <a href="wishlist.html">❤️ المفضلة</a>
        </nav>
        <div class="header-actions">
            <a href="cart.html" class="cart-link">
                <div id="nav-cart-count-container" class="nav-cart-count-container">
                    <span id="nav-cart-count" aria-hidden="true" class="nav-cart-count nav-cart-0">0</span>
                    <span class="nav-cart-icon">🛒</span>
                </div>
                السلة
            </a>
        </div>
    </header>

    <main class="container">
        <div class="cart-layout" id="cart-content">
            <!-- Content will be injected by JS -->
            <div style="grid-column: 1/-1; text-align: center; padding: 5rem;">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: #00d4ff;"></i>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/api-integration.js"></script>
    <script src="../js/session-manager.js"></script>
    <script src="../js/script.js"></script>
    <script>
        function renderUI() {
            const cart = getCart();
            const container = document.getElementById('cart-content');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="cart-card" style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <h2>سلة التسوق فارغة</h2>
                            <p>يبدو أنك لم تضف أي منتجات بعد.</p>
                            <a href="products.html" class="browse-btn">تصفح المنتجات</a>
                        </div>
                    </div>
                `;
                return;
            }

            const totals = calculateTotal();
            const itemsHtml = cart.map((item) => {
                const itemTotal = item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <img src="${getImagePath(item.image)}" class="item-img" alt="${item.name}">
                        <div class="item-details">
                            <h3>${item.name}</h3>
                            <div class="item-price">${parseFloat(item.price).toFixed(2)} ج.م</div>
                            <div class="quantity-ctrl">
                                <button class="qty-btn" onclick="updateQty('${item.id}', -1)"><i class="fa-solid fa-minus"></i></button>
                                <span class="qty-val">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQty('${item.id}', 1)"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="remove-btn" onclick="removeItem('${item.id}')"><i class="fa-solid fa-trash-can"></i></button>
                            <div style="font-weight: 800; color: #fff;">${itemTotal.toFixed(2)} ج.م</div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="cart-main">
                    <h1 class="page-title">سلة التسوق <span style="font-size: 1rem; color: #aaa; font-weight: 500;">(${cart.length} منتجات)</span></h1>
                    <div class="cart-card">
                        ${itemsHtml}
                    </div>
                </div>
                <aside class="cart-sidebar">
                    <div class="summary-card">
                        <h2 class="summary-title">ملخص الطلب</h2>
                        <div class="summary-row">
                            <span class="text-muted">المجموع الفرعي</span>
                            <span>${totals.subtotal} ج.م</span>
                        </div>
                        <div class="summary-row">
                            <span class="text-muted">الضريبة (5%)</span>
                            <span>${totals.tax} ج.م</span>
                        </div>
                        <div class="summary-row">
                            <span class="text-muted">تكلفة الشحن</span>
                            <span>${totals.shipping.toFixed(2)} ج.م</span>
                        </div>
                        <div class="summary-total summary-row">
                            <span>الإجمالي</span>
                            <span style="color: #00d4ff;">${totals.total} ج.م</span>
                        </div>
                        <button class="checkout-btn" onclick="window.location.href='checkout.html'">
                            إتمام الشراء
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <a href="products.html" style="display: block; text-align: center; margin-top: 1rem; color: #aaa; text-decoration: none; font-size: 0.9rem; transition: 0.3s;">
                            متابعة التسوق
                        </a>
                    </div>
                </aside>
            `;
        }

        function updateQty(productId, delta) {
            const cart = getCart();
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity < 1) item.quantity = 1;
                saveCart(cart);
            }
        }

        function removeItem(productId) {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                const cart = getCart().filter(i => i.id !== productId);
                saveCart(cart);
            }
        }

        document.addEventListener('DOMContentLoaded', renderUI);
    </script>
</body>
</html>
