<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1b1b20">
    <title>استعادة كلمة المرور - BODA</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .forgot-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        
        .forgot-container h2 {
            font-family: 'Orbitron', monospace;
            color: #00d4ff;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .forgot-container p {
            color: #b0b0b0;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .forgot-container input[type="email"] {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            outline: none;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .forgot-container input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .forgot-container button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, #00d4ff, #090979);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .forgot-container a {
            display: block;
            margin-top: 1.5rem;
            color: #00d4ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-container" onclick="window.location.href='../index.html'" style="cursor: pointer;">
            <div class="logo">🛍️ BODA</div>
        </div>
        <div class="header-search">
            <form action="products.html" method="GET" class="search-form">
                <input type="text" name="search" placeholder="ابحث عن المنتجات..." aria-label="Search">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>
        <nav class="nav-menu">
            <a href="../index.html">🏠 الرئيسية</a>
            <a href="products.html">📦 المنتجات</a>
            <a href="login.html" id="login-link">🔐 تسجيل الدخول </a>
            <a href="orders.html">📋 الطلبات</a>
            <a href="wishlist.html">❤️ المفضلة</a>
        </nav>
        <div class="header-actions">
            <a href="cart.html" class="cart-link">
                <div id="nav-cart-count-container" class="nav-cart-count-container">
                    <span id="nav-cart-count" aria-hidden="true" class="nav-cart-count nav-cart-0">0</span>
                    <span class="nav-cart-icon">🛒</span>
                </div>
                السلة
            </a>
        </div>
    </header>

    <div class="forgot-container">
        <h2>استعادة كلمة المرور</h2>
        <p>أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.</p>
        <form id="forgot-form">
            <div class="form-group">
                <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            </div>
            <button type="submit" id="submit-btn">إرسال الرابط</button>
        </form>
        <a href="login.html">العودة لتسجيل الدخول</a>
        <div id="message" style="margin-top: 1.5rem; display: none; padding: 1rem; border-radius: 8px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/api-integration.js"></script>
    <script src="../js/session-manager.js"></script>
    <script src="../js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', updateCartCount);
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('message');
            
            btn.disabled = true;
            btn.textContent = 'جاري الإرسال...';
            
            try {
                const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/pages/reset-password.html',
                });
                
                msg.style.display = 'block';
                if (error) {
                    msg.style.background = 'rgba(244, 67, 54, 0.1)';
                    msg.style.color = '#f44336';
                    msg.style.border = '1px solid #f44336';
                    msg.textContent = 'حدث خطأ: ' + error.message;
                } else {
                    msg.style.background = 'rgba(76, 175, 80, 0.1)';
                    msg.style.color = '#4CAF50';
                    msg.style.border = '1px solid #4CAF50';
                    msg.textContent = 'تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني.';
                }
            } catch (err) {
                msg.textContent = 'حدث خطأ غير متوقع.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'إرسال الرابط';
            }
        });
    </script>
</body>
</html>
