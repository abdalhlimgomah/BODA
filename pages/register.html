<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1b1b20">
    <title>التسجيل - BODA</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .register-container {
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        
        .register-container h2 {
            font-family: 'Orbitron', monospace;
            color: #00d4ff;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .register-container input[type="text"],
        .register-container input[type="email"],
        .register-container input[type="password"],
        .register-container input[type="tel"] {
            width: 100%;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            outline: none;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            -webkit-appearance: none;
            appearance: none;
            min-height: 44px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .register-container input::placeholder {
            color: #b0b0b0;
        }

        .register-container input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        
        .register-container button {
            width: 100%;
            padding: 1rem;
            min-height: 48px;
            background: linear-gradient(45deg, #00d4ff, #090979);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .register-container button:active {
            transform: scale(0.98);
        }

        .auth-message {
            margin-bottom: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            font-size: 0.95rem;
            display: none;
        }

        .auth-message.success {
            display: block;
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.35);
        }

        .auth-message.error {
            display: block;
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.35);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 1.2rem 0;
            color: #b0b0b0;
            font-size: 0.85rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .google-btn {
            width: 100%;
            padding: 0.9rem 1rem;
            min-height: 48px;
            background: #ffffff;
            color: #1b1b20;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .google-btn:active {
            transform: scale(0.98);
        }

        .register-container a {
            color: #00d4ff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .register-container a:hover {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
        }

        @media (max-width: 480px) {
            .register-container {
                margin: 1rem;
                padding: 1.5rem;
                border-radius: 12px;
            }

            .register-container h2 {
                font-size: 1.5rem;
            }

            .register-container input,
            .register-container button {
                padding: 0.75rem;
                font-size: 16px;
                min-height: 48px;
            }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>إنشاء حساب جديد</h2>
        <div id="auth-message" class="auth-message" role="status" aria-live="polite"></div>
        <form id="register">
            <div class="form-group">
                <input type="text" name="fullName" placeholder="الاسم الكامل" inputmode="text" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="البريد الإلكتروني" inputmode="email" required>
            </div>
            <div class="form-group">
                <input type="tel" name="phone" placeholder="رقم الهاتف" inputmode="tel" required autocomplete="tel">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="كلمة المرور" required>
            </div>
            <div class="form-group">
                <input type="password" name="confirmPassword" placeholder="تأكيد كلمة المرور" required>
            </div>
            <button type="submit">إنشاء حساب</button>
        </form>
        <p style="margin-top: 0.75rem; color: #b0b0b0; font-size: 0.9rem;">بعد تأكيد البريد الإلكتروني سيتم تحويلك لتسجيل الدخول</p>
        <a href="login.html" style="display: block; margin-top: 1rem; font-weight: bold;">لديك حساب بالفعل؟ تسجيل الدخول</a>
    </div>

    <!-- Mock API for offline support -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/mock-api.js"></script>
    <!-- API Integration -->
    <script src="../js/api-integration.js"></script>
    <script src="../js/session-manager.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/login.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', updateCartCount);
    </script>
</body>
